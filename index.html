<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verified - RentLink</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #1f2937;
        }

        .verification-card {
            background-color: #ffffff;
            padding: 48px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 440px;
            width: 90%;
        }

        .brand-logo {
            font-size: 28px;
            font-weight: 800;
            color: #111827;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
        }

        .brand-logo span {
            color: #2563eb;
        }

        .icon-container {
            width: 64px;
            height: 64px;
            background-color: #d1fae5;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 24px auto;
        }

        .icon-container svg {
            width: 32px;
            height: 32px;
            color: #10b981;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        p {
            font-size: 15px;
            color: #6b7280;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .login-button {
            display: inline-block;
            background-color: #2563eb;
            color: #ffffff;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            width: 100%;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .login-button:hover {
            background-color: #1d4ed8;
        }

        .login-button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="verification-card">
        <div class="brand-logo">Rent<span>Link</span></div>

        <div class="icon-container">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
            </svg>
        </div>

        <h1>Email Verified!</h1>
        <p>Thank you for verifying your email address. Your RentLink account is now active and ready to use.</p>

        <a href="/login" class="login-button">Go to Log In</a>
    </div>

</body>
</html>
